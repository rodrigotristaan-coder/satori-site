<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>SATORI — Estrategia Digital · v3</title>
<link rel="icon" href="favicon.ico"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@200;300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  *,*::before,*::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Playfair Display', Georgia, serif;
    font-weight: 400;
    background: #F4F4F2;
    color: #0E0E0E;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  ::selection { background: #A67C00; color: #F4F4F2; }
  @keyframes ensoSpin { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }

  /* ---------- GLASS BUBBLE HOVER (Apple-style) ---------- */
  a[href], button {
    transition: transform .35s cubic-bezier(.2,.9,.3,1.4),
                box-shadow .35s cubic-bezier(.2,.9,.3,1.4),
                background .25s ease, color .25s ease, border-color .25s ease;
    will-change: transform;
  }
  a[href]:hover, button:hover {
    transform: translateY(-2px) scale(1.02);
  }
  /* Solid dark CTA → glass bubble shine */
  a[href][style*="background: rgb(14, 14, 14)"]:hover,
  button[style*="background: rgb(14, 14, 14)"]:hover {
    box-shadow: 0 12px 28px -10px rgba(14,14,14,.45),
                inset 0 1px 0 rgba(255,255,255,.18),
                inset 0 -1px 0 rgba(0,0,0,.25);
  }
  /* Gold CTA → warm bubble */
  a[href][style*="background: rgb(166, 124, 0)"]:hover {
    box-shadow: 0 12px 30px -10px rgba(166,124,0,.55),
                inset 0 1px 0 rgba(255,255,255,.25),
                inset 0 -1px 0 rgba(0,0,0,.18);
  }
  /* Ghost/outline → fill on hover */
  a[href][style*="background: transparent"]:hover,
  button[style*="background: transparent"]:hover {
    background: rgba(14,14,14,.06) !important;
    border-color: rgba(14,14,14,.45) !important;
  }
  /* FAQ + service cards: subtle lift */
  [data-bubble]:hover {
    transform: translateY(-3px);
    box-shadow: 0 18px 40px -18px rgba(14,14,14,.18),
                inset 0 1px 0 rgba(255,255,255,.5);
  }
  [data-bubble] {
    transition: transform .4s cubic-bezier(.2,.9,.3,1.2),
                box-shadow .4s ease;
  }

  /* ---------- HOVER GOLD per-word ---------- */
  /* Words are wrapped in .gw spans by JS after render. */
  .gw {
    transition: color .25s ease;
    display: inline-block; /* lets each word be hovered cleanly */
  }
  .gw:hover { color: #A67C00 !important; }
  /* Inside the dark Cotizar section, don't flip word color */
  [data-no-gold] .gw:hover { color: inherit !important; }

  /* ---------- NAV CTA gold glow at 10s ---------- */
  @keyframes navCtaGlow {
    0%   { background: rgb(14,14,14); box-shadow: none; }
    18%  { background: #A67C00; box-shadow: 0 0 0 0 rgba(166,124,0,0.55), 0 0 28px 6px rgba(166,124,0,0.55); }
    55%  { background: #A67C00; box-shadow: 0 0 0 14px rgba(166,124,0,0), 0 0 36px 10px rgba(166,124,0,0.35); }
    100% { background: rgb(14,14,14); box-shadow: none; }
  }
  .nav-cta-glow { animation: navCtaGlow 3.6s ease-out 10s 1 both; }

  /* ---------- ENSO hover-gold (homologated across all 3) ---------- */
  .enso-host img { transition: filter .55s ease; }
  .enso-host:hover img {
    filter: brightness(0) saturate(100%) invert(48%) sepia(85%) saturate(820%) hue-rotate(15deg) brightness(93%) contrast(99%) !important;
  }

  /* ---------- RUTA reveal-on-scroll (gold fade) ---------- */
  [data-ruta-step] {
    opacity: 0;
    transform: translateY(14px) !important;
    filter: drop-shadow(0 0 0 rgba(166,124,0,0));
  }
  [data-ruta-step][data-revealed="1"] {
    opacity: 1;
    transform: translateY(0) !important;
    animation: rutaGoldFlash 1.6s ease-out;
  }
  @keyframes rutaGoldFlash {
    0%   { filter: drop-shadow(0 0 0 rgba(166,124,0,0)); }
    35%  { filter: drop-shadow(0 0 18px rgba(166,124,0,0.85)); }
    100% { filter: drop-shadow(0 0 0 rgba(166,124,0,0)); }
  }

  /* mobile */
  @media (max-width: 860px) {
    .nav-links a:not(:last-child):not(button) { display: none; }
    .hero-grid, .nosotros-grid, .serv-grid, .serv-stack, .rev-grid, .stats-grid, .ruta-row {
      grid-template-columns: 1fr !important;
      flex-direction: column !important;
    }
    .ruta-row { gap: 1.5rem; }
    .ruta-row > div { padding: 0 !important; }
  }
  @media (max-width: 600px) {
    .nav-links { gap: 1rem !important; }
    .nav-links a:not(:last-child) { display: none; }
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="components-v3.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel">
const { useState, useEffect } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "heroLayout": "split",
  "serviciosLayout": "stack",
  "imageTreatment": "duotone",
  "showMatrix": true,
  "matrixOpacity": 0.06,
  "lang": "en"
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [showLangPopup, setShowLangPopup] = useState(true);
  const [hasChosen, setHasChosen] = useState(false);

  const lang = t.lang;
  const c = content[lang];

  // Skip popup if lang already chosen
  useEffect(() => {
    if (hasChosen) setShowLangPopup(false);
  }, [hasChosen]);

  // Wrap each SENTENCE in a <span class="gw"> so hover-gold fires per sentence
  useEffect(() => {
    const id = setTimeout(() => {
      const targets = document.querySelectorAll(
        "section h1, section h2, section h3, section h4, section p, section li, section blockquote"
      );
      const SKIP = new Set(["A", "BUTTON", "SCRIPT", "STYLE", "SVG", "INPUT", "TEXTAREA"]);
      // Match a sentence: anything up to a sentence terminator (incl. ?¿!¡.) plus any
      // trailing close-quote/bracket; or trailing fragment without terminator.
      const sentenceRe = /[^.?!¡¿…]+[.?!¡¿…]+["'»”’)\]]*\s*|[^.?!¡¿…]+$/g;
      const wrap = (node) => {
        const kids = Array.from(node.childNodes);
        kids.forEach((child) => {
          if (child.nodeType === 3) {
            const text = child.textContent;
            if (!/\S/.test(text)) return;
            const matches = text.match(sentenceRe);
            if (!matches) return;
            const frag = document.createDocumentFragment();
            matches.forEach((part) => {
              if (!part) return;
              if (!/\S/.test(part)) {
                frag.appendChild(document.createTextNode(part));
              } else {
                const s = document.createElement("span");
                s.className = "gw";
                s.textContent = part;
                frag.appendChild(s);
              }
            });
            child.parentNode.replaceChild(frag, child);
          } else if (child.nodeType === 1) {
            if (SKIP.has(child.tagName)) return;
            if (child.classList && child.classList.contains("gw")) return;
            wrap(child);
          }
        });
      };
      targets.forEach((el) => {
        if (el.dataset.gw === "1") return;
        wrap(el);
        el.dataset.gw = "1";
      });
    }, 60);
    return () => clearTimeout(id);
  }, [lang, t.heroLayout, t.serviciosLayout, t.imageTreatment]);

  // Reveal Ruta steps with a gold fade, staggered, when section enters view
  useEffect(() => {
    const id = setTimeout(() => {
      const steps = document.querySelectorAll("[data-ruta-step]");
      if (!steps.length) return;
      const ruta = document.querySelector("#ruta");
      if (!ruta) return;
      const io = new IntersectionObserver((entries) => {
        entries.forEach((e) => {
          if (e.isIntersecting) {
            steps.forEach((s, i) => {
              setTimeout(() => s.setAttribute("data-revealed", "1"), i * 280);
            });
            io.disconnect();
          }
        });
      }, { threshold: 0.25 });
      io.observe(ruta);
      return () => io.disconnect();
    }, 120);
    return () => clearTimeout(id);
  }, [lang]);

  const onLangSelect = (l) => {
    setTweak("lang", l);
    setShowLangPopup(false);
    setHasChosen(true);
  };

  return (
    <main style={{ position: "relative", minHeight: "100vh", background: "#F4F4F2" }}>
      {t.showMatrix && <MatrixBackground opacity={t.matrixOpacity} color="#A67C00"/>}

      {showLangPopup && <LangPopup onSelect={onLangSelect}/>}

      <Nav c={c} lang={lang} onOpenLang={() => setShowLangPopup(true)}/>

      <Hero c={c} layout={t.heroLayout}/>
      <Nosotros c={c} treatment={t.imageTreatment}/>
      <Problema c={c} layout={t.heroLayout === "center" ? "list" : "card"}/>
      <Stats c={c}/>
      <Servicios c={c} layout={t.serviciosLayout} treatment={t.imageTreatment}/>
      <Reviews c={c}/>
      <Cotizar c={c} lang={lang}/>
      <Faq c={c}/>
      <RutaSection c={c}/>
      <Mapa c={c}/>
      <CtaFinal c={c} lang={lang}/>
      <Footer c={c}/>

      <FloatingCTAs lang={lang} c={c}/>

      <TweaksPanel title="Tweaks · Satori">
        <TweakSection title="Idioma">
          <TweakRadio
            label="Idioma activo"
            value={t.lang}
            options={[{value:"es",label:"ES"},{value:"en",label:"EN"}]}
            onChange={(v) => setTweak("lang", v)}
          />
        </TweakSection>

        <TweakSection title="Hero">
          <TweakRadio
            label="Layout"
            value={t.heroLayout}
            options={[{value:"split",label:"Split"},{value:"center",label:"Centro"}]}
            onChange={(v) => setTweak("heroLayout", v)}
          />
        </TweakSection>

        <TweakSection title="Servicios">
          <TweakRadio
            label="Layout"
            value={t.serviciosLayout}
            options={[{value:"grid",label:"Grid 3"},{value:"stack",label:"Stack"}]}
            onChange={(v) => setTweak("serviciosLayout", v)}
          />
        </TweakSection>

        <TweakSection title="Imágenes">
          <TweakSelect
            label="Tratamiento"
            value={t.imageTreatment}
            options={[
              {value:"duotone",label:"Duotone oro"},
              {value:"bw",label:"Blanco y negro"},
              {value:"grain",label:"Con grano"},
            ]}
            onChange={(v) => setTweak("imageTreatment", v)}
          />
        </TweakSection>

        <TweakSection title="Fondo Matrix">
          <TweakToggle label="Visible" value={t.showMatrix} onChange={(v) => setTweak("showMatrix", v)}/>
          {t.showMatrix && (
            <TweakSlider label="Intensidad" value={t.matrixOpacity} min={0.02} max={0.2} step={0.01} onChange={(v) => setTweak("matrixOpacity", v)}/>
          )}
        </TweakSection>
      </TweaksPanel>
    </main>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
