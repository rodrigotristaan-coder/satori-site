<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<title>Satori — WhatsApp</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400&display=swap" rel="stylesheet"/>
<style>
  html, body { margin: 0; padding: 0; background: #F4F4F2; height: 100%; width: 100%; }
  body {
    min-width: 100vw; min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 0;
    font-family: 'Playfair Display', serif;
    color: #0E0E0E;
  }
  .ring {
    width: 560px; height: 560px;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .ring img {
    width: 100%; height: 100%;
    object-fit: contain;
    filter: brightness(0) saturate(100%) invert(48%) sepia(85%) saturate(820%) hue-rotate(15deg) brightness(93%) contrast(99%);
  }
  .S {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 200px; color: #0E0E0E;
    letter-spacing: -0.03em;
  }
</style>
</head>
<body>
  <div class="ring">
    <img src="enso.png" alt=""/>
    <div class="S">S</div>
  </div>
</body>
</html>
