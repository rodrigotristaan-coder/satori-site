<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<title>Satori — Logo</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  html, body { margin: 0; padding: 0; background: #F4F4F2; height: 100%; width: 100%; }
  body {
    min-width: 100vw; min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Playfair Display', serif;
    color: #0E0E0E;
  }
  .wrap { text-align: center; }
  .word {
    font-size: 220px; line-height: 1;
    letter-spacing: -0.025em; font-weight: 400;
    display: inline-flex; align-items: baseline;
  }
  .o-arc {
    display: inline-block;
    width: 0.62em; height: 0.62em;
    position: relative; top: 0.04em; margin: 0 0.015em;
  }
  .o-arc svg { display: block; overflow: visible; }
  .tag {
    margin-top: 28px;
    font-family: 'DM Sans', sans-serif;
    font-size: 22px; letter-spacing: 0.42em;
    text-transform: uppercase;
    color: #A67C00;
    font-weight: 500;
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="word">Sat<span class="o-arc"><svg viewBox="-50 -50 100 100" width="100%" height="100%"><path d="M 44.75 -4.71 A 45 45 0 1 0 44.75 4.71" fill="none" stroke="#0E0E0E" stroke-width="7" stroke-linecap="round"/></svg></span>ri</div>
    <div class="tag">Estrategia digital</div>
  </div>
</body>
</html>
