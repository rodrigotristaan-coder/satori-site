<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>SATORI — Estrategia Digital</title>
<meta name="description" content="Estrategia digital para empresarios que valoran su tiempo. Identidad, posicionamiento y marketing con IA — sin caos, sin promesas vacías."/>
<link rel="icon" href="favicon.ico"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@200;300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  *,*::before,*::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    font-weight: 300;
    background: #F4F4F2;
    color: #0E0E0E;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  ::selection { background: #A67C00; color: #F4F4F2; }
  @keyframes ensoSpin { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }

  a[href], button {
    transition: transform .35s cubic-bezier(.2,.9,.3,1.4),
                box-shadow .35s cubic-bezier(.2,.9,.3,1.4),
                background .25s ease, color .25s ease, border-color .25s ease;
    will-change: transform;
  }
  a[href]:hover, button:hover { transform: translateY(-2px) scale(1.02); }
  a[href][style*="background: rgb(14, 14, 14)"]:hover,
  button[style*="background: rgb(14, 14, 14)"]:hover {
    box-shadow: 0 12px 28px -10px rgba(14,14,14,.45),
                inset 0 1px 0 rgba(255,255,255,.18),
                inset 0 -1px 0 rgba(0,0,0,.25);
  }
  a[href][style*="background: rgb(166, 124, 0)"]:hover {
    box-shadow: 0 12px 30px -10px rgba(166,124,0,.55),
                inset 0 1px 0 rgba(255,255,255,.25),
                inset 0 -1px 0 rgba(0,0,0,.18);
  }
  a[href][style*="background: transparent"]:hover,
  button[style*="background: transparent"]:hover {
    background: rgba(14,14,14,.06) !important;
    border-color: rgba(14,14,14,.45) !important;
  }
  [data-bubble]:hover {
    transform: translateY(-3px);
    box-shadow: 0 18px 40px -18px rgba(14,14,14,.18),
                inset 0 1px 0 rgba(255,255,255,.5);
  }
  [data-bubble] { transition: transform .4s cubic-bezier(.2,.9,.3,1.2), box-shadow .4s ease; }

  @media (max-width: 860px) {
    .nav-links a:not(:last-child):not(button) { display: none; }
    .hero-grid, .nosotros-grid, .serv-grid, .serv-stack, .rev-grid, .stats-grid, .ruta-row {
      grid-template-columns: 1fr !important;
      flex-direction: column !important;
    }
    .ruta-row { gap: 1.5rem; }
    .ruta-row > div { padding: 0 !important; }
  }
  @media (max-width: 600px) {
    .nav-links { gap: 1rem !important; }
    .nav-links a:not(:last-child) { display: none; }
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" data-presets="env,react">
const { useState, useEffect } = React;

function App() {
  const [lang, setLang] = useState("es");
  const [showLangPopup, setShowLangPopup] = useState(true);
  const c = content[lang];

  const onLangSelect = (l) => {
    setLang(l);
    setShowLangPopup(false);
  };

  return (
    <main style={{ position: "relative", minHeight: "100vh", background: "#F4F4F2" }}>
      <MatrixBackground opacity={0.07} color="#A67C00"/>
      {showLangPopup && <LangPopup onSelect={onLangSelect}/>}
      <Nav c={c} lang={lang} onOpenLang={() => setShowLangPopup(true)}/>
      <Hero c={c} layout="split"/>
      <Problema c={c} layout="card"/>
      <Stats c={c}/>
      <Servicios c={c} layout="grid" treatment="duotone"/>
      <Nosotros c={c} treatment="duotone"/>
      <Reviews c={c}/>
      <Mapa c={c}/>
      <Faq c={c}/>
      <Cotizar c={c} lang={lang}/>
      <Footer c={c}/>
      <FloatingCTAs lang={lang} c={c}/>
    </main>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
